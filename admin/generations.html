<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生成记录 · 智聊后台</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body>
  <div class="admin">
    <aside class="admin-sidebar"></aside>
    <div class="sidebar-mask" data-toggle="sidebar" data-target=".admin-sidebar"></div>

    <div class="admin-content">
      <header class="admin-topbar"></header>

      <div class="admin-page">
        <div class="admin-page__header">
          <div>
            <h1 class="admin-page__title">生成记录</h1>
            <div class="admin-page__subtitle">所有用户的对话与图像生成记录 · 点击行查看完整内容与失败原因</div>
          </div>
          <button class="c-btn c-btn--secondary"><span data-icon="download"></span>导出</button>
        </div>

        <div class="c-tabs" style="margin-bottom: 16px;">
          <button class="c-tab is-active">全部 (324,901)</button>
          <button class="c-tab">对话 (276,691)</button>
          <button class="c-tab">生图 (48,210)</button>
          <button class="c-tab">失败 (4,201)</button>
        </div>

        <div class="toolbar">
          <div class="toolbar__left">
            <div class="c-search">
              <span class="icon-search" data-icon="search" data-size="16"></span>
              <input class="c-input" placeholder="搜索请求 ID、用户、提示词..." />
            </div>
            <select class="c-select" style="width: 140px;">
              <option>全部模型</option>
              <option>智聊 4</option>
              <option>智聊 3.5</option>
              <option>DALL·E 风格 v3</option>
              <option>MidJourney 6</option>
            </select>
            <select class="c-select" style="width: 140px;">
              <option>今日</option>
              <option>最近 7 天</option>
              <option>最近 30 天</option>
              <option>自定义</option>
            </select>
          </div>
        </div>

        <div class="c-table-wrap">
          <table class="c-table">
            <thead>
              <tr>
                <th>请求 ID</th>
                <th>用户</th>
                <th>类型</th>
                <th>模型</th>
                <th>提示词 / 摘要</th>
                <th>Tokens / 张数</th>
                <th>消耗</th>
                <th>耗时</th>
                <th>状态</th>
                <th>时间</th>
              </tr>
            </thead>
            <tbody id="genRows">
              <!-- JS 渲染 -->
            </tbody>
          </table>
          <div class="c-pagination">
            <span class="u-caption" style="margin-right:auto; padding-left: 8px;">共 324,901 条</span>
            <button class="c-page-btn" disabled><span data-icon="chevron-left" data-size="14"></span></button>
            <button class="c-page-btn is-active">1</button>
            <button class="c-page-btn">2</button>
            <button class="c-page-btn">3</button>
            <button class="c-page-btn">…</button>
            <button class="c-page-btn"><span data-icon="chevron-right" data-size="14"></span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 详情抽屉 -->
  <div class="c-drawer-mask" id="detailDrawer">
    <div class="c-drawer">
      <div class="c-drawer__head">
        <div>
          <div class="c-drawer__title" id="drawerTitle">请求详情</div>
          <div class="c-drawer__sub" id="drawerSub"></div>
        </div>
        <button class="c-icon-btn" data-close-modal="detailDrawer"><span data-icon="x"></span></button>
      </div>
      <div class="c-drawer__body" id="drawerBody"></div>
      <div class="c-drawer__footer">
        <button class="c-btn c-btn--ghost" data-close-modal="detailDrawer">关闭</button>
        <button class="c-btn c-btn--secondary"><span data-icon="copy" data-size="14"></span>复制 Request ID</button>
        <button class="c-btn c-btn--secondary"><span data-icon="refresh" data-size="14"></span>重试</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/common.js"></script>
  <script src="_partials.js"></script>
  <script>
    mountAdmin({ active: 'generations', title: '生成记录' });

    // ---------- 数据 ----------
    const ROWS = [
      {
        id: 'req_a8d92f01', user: { name: 'Fiona Giallo', id: 'U102438', avatar: 'FG', color: '#10A37F' },
        type: 'chat', typeLabel: '对话', model: '智聊 4',
        promptShort: '展开"性能与稳定性",并给出验收方法',
        prompt: '展开"性能与稳定性",并给出验收方法。我希望每条都包含具体工具和量化指标。',
        response: `性能与稳定性 · 验收方法

1. 启动耗时:使用 Android Vitals 或 Xcode Instruments 多次冷启动取 P95,目标 ≤ 2000ms。

2. 滚动帧率:用 GfxInfo / FPS Monitor 录制 30 秒长列表滚动,掉帧率 < 5%。

3. 内存:启动到聊天列表稳态,使用 Memory Profiler 观察 5 分钟,无明显增长(允许 < 10MB / 5min)。

4. Crash:接入 Bugly / Sentry,灰度 7 天 Crash-Free Sessions ≥ 99.9%。

5. 弱网:用 Network Link Conditioner 模拟 3G、丢包 5%,核心功能可用。`,
        tokensIn: 1820, tokensOut: 920, cost: 12, durationMs: 2400, status: 'ok', time: '2026-05-22 14:22:48',
        upstream: { provider: 'OpenAI', endpoint: '/v1/chat/completions', model: 'gpt-4o', code: 200 },
      },
      {
        id: 'req_b1c83721', user: { name: 'Liam Marais', id: 'U102439', avatar: 'LM', color: '#3B82F6' },
        type: 'image', typeLabel: '生图', model: 'DALL·E 风格 v3',
        promptShort: '极简产品海报,白色背景,带强烈品牌色块',
        prompt: '极简产品海报,白色背景,带强烈品牌色块,中央放置耳机,品牌名"AURA"使用无衬线字体,32:1024 横版构图,商业摄影感',
        images: 4,
        cost: 40, durationMs: 18200, status: 'ok', time: '2026-05-22 14:18:12',
        upstream: { provider: 'OpenAI', endpoint: '/v1/images/generations', model: 'dall-e-3', code: 200 },
      },
      {
        id: 'req_c4e2a019', user: { name: 'Sora Kawano', id: 'U102440', avatar: 'SK', color: '#F0B72F' },
        type: 'chat', typeLabel: '对话', model: '智聊 3.5',
        promptShort: '帮我用日语翻译这段产品介绍',
        prompt: '帮我用日语翻译这段产品介绍:"AURA 是一款主动降噪无线耳机,续航 30 小时,支持多设备无缝切换。"',
        response: '「AURA は、アクティブノイズキャンセリング機能を搭載したワイヤレスイヤホンです。最大30時間のバッテリー駆動と、複数デバイス間のシームレスな切り替えに対応しています。」',
        tokensIn: 820, tokensOut: 410, cost: 4, durationMs: 1100, status: 'ok', time: '2026-05-22 14:15:30',
        upstream: { provider: 'OpenAI', endpoint: '/v1/chat/completions', model: 'gpt-3.5-turbo', code: 200 },
      },
      {
        id: 'req_d9f01a82', user: { name: 'Ricardo Zambrano', id: 'U102441', avatar: 'RZ', color: '#EF4444' },
        type: 'image', typeLabel: '生图', model: 'MidJourney 6',
        promptShort: 'cyberpunk samurai standing in neon rain',
        prompt: 'cyberpunk samurai standing in neon rain, ultra detailed, cinematic lighting, 8k --ar 16:9',
        images: 2,
        cost: 30, durationMs: 32400, status: 'ok', time: '2026-05-22 14:11:08',
        upstream: { provider: 'MJ-Proxy', endpoint: '/mj/submit/imagine', model: 'mj6', code: 200 },
      },
      {
        id: 'req_g7d9e120', user: { name: 'Tomas Holm', id: 'U102444', avatar: 'TH', color: '#06B6D4' },
        type: 'image', typeLabel: '生图', model: 'MidJourney 6',
        promptShort: 'misty mountain landscape, oil painting',
        prompt: 'misty mountain landscape, oil painting, romantic style, soft lighting, sunrise --ar 16:9',
        images: 2,
        cost: 0, durationMs: 42000, status: 'err', time: '2026-05-22 14:02:18',
        upstream: { provider: 'MJ-Proxy', endpoint: '/mj/submit/imagine', model: 'mj6', code: 504 },
        error: {
          code: 'UPSTREAM_TIMEOUT',
          message: 'Upstream provider did not respond within 42000ms.',
          raw: '{\n  "error": "gateway_timeout",\n  "trace_id": "mj-trace-9f0a72e1",\n  "retried": 2,\n  "last_status": 504\n}'
        },
      },
      {
        id: 'req_q08812af', user: { name: 'Ewa Wojcik', id: 'U102445', avatar: 'EW', color: '#8B5CF6' },
        type: 'chat', typeLabel: '对话', model: '青狼 Qwen2-72B',
        promptShort: '帮我把这段代码翻译成 Go',
        prompt: '帮我把这段 Python 代码翻译成 Go:\n\n```python\ndef fib(n):\n    if n < 2: return n\n    return fib(n-1) + fib(n-2)\n```',
        response: '',
        tokensIn: 120, tokensOut: 0, cost: 0, durationMs: 320, status: 'err', time: '2026-05-22 13:58:22',
        upstream: { provider: '本地 vLLM', endpoint: '/v1/chat/completions', model: 'Qwen2-72B', code: 500 },
        error: {
          code: 'UPSTREAM_INTERNAL',
          message: 'CUDA out of memory at layer 78. Circuit breaker tripped.',
          raw: '{\n  "error": "RuntimeError: CUDA out of memory. Tried to allocate 256.00 MiB.",\n  "node": "gpu-worker-3",\n  "vram_used": "47.8 GiB / 48 GiB"\n}'
        },
      },
      {
        id: 'req_h2f1b809', user: { name: 'Yara Abboud', id: 'U102446', avatar: 'YA', color: '#EC4899' },
        type: 'chat', typeLabel: '对话', model: '深思 Pro',
        promptShort: '总结这份 PDF 的主要观点',
        prompt: '总结这份 PDF 的主要观点(已上传文件 quarterly-report.pdf,18 页)。',
        response: '本季度报告主要观点:\n\n1. 营收同比增长 24.6%,主要由 Pro 订阅推动\n2. 用户留存率提升至 78%(上季度 71%)\n3. 海外市场贡献 32% 营收,东南亚为最大增量\n4. 风险:北美区域获客成本上升 18%\n5. 建议:加大 Pro 订阅折扣促销 + 优化新用户引导漏斗',
        tokensIn: 18200, tokensOut: 1420, cost: 38, durationMs: 8400, status: 'ok', time: '2026-05-22 13:55:01',
        upstream: { provider: 'Anthropic', endpoint: '/v1/messages', model: 'claude-3-opus', code: 200 },
      },
      {
        id: 'req_i5a8c211', user: { name: 'Fiona Giallo', id: 'U102438', avatar: 'FG', color: '#10A37F' },
        type: 'chat', typeLabel: '对话', model: '智聊 4',
        promptShort: '帮我列一份移动端聊天 App 上线前的关键检查清单',
        prompt: '帮我列一份移动端聊天 App 上线前的关键检查清单。',
        response: '没问题。以下是一份移动端聊天 App 上线前的关键检查清单,按优先级分组:\n\n1. 核心功能\n• 登录 / 注册 / 找回密码全流程验证\n• 文字消息发送、接收、撤回\n• 图片、文件、语音消息\n• 离线消息、断网重连\n\n2. 性能与稳定性\n• 启动耗时 ≤ 2s(冷启动)\n• 长对话滚动 60 FPS\n...',
        tokensIn: 620, tokensOut: 1420, cost: 18, durationMs: 3600, status: 'ok', time: '2026-05-22 13:52:14',
        upstream: { provider: 'OpenAI', endpoint: '/v1/chat/completions', model: 'gpt-4o', code: 200 },
      },
    ];

    // ---------- 渲染表格 ----------
    function statusBadge(s) {
      if (s === 'ok')   return '<span class="dot-state dot-state--ok">成功</span>';
      if (s === 'err')  return '<span class="dot-state dot-state--err">失败</span>';
      if (s === 'warn') return '<span class="dot-state dot-state--warn">警告</span>';
      return '<span class="dot-state dot-state--off">—</span>';
    }
    function typeBadge(t) {
      return t === 'image'
        ? '<span class="c-badge c-badge--info">生图</span>'
        : '<span class="c-badge c-badge--brand">对话</span>';
    }
    function tokensCell(r) {
      if (r.type === 'image') return r.images + ' 张';
      return (r.tokensIn || 0).toLocaleString() + ' in / ' + (r.tokensOut || 0).toLocaleString() + ' out';
    }
    function shortTime(t) {
      // "2026-05-22 14:22:48" -> "14:22"
      return t.split(' ')[1].slice(0, 5);
    }

    const tbody = document.getElementById('genRows');
    tbody.innerHTML = ROWS.map((r, i) => `
      <tr data-idx="${i}" style="cursor:pointer;">
        <td><code>${r.id}</code></td>
        <td>
          <div class="user-cell">
            <span class="c-avatar c-avatar--sm" style="background:${r.user.color};">${r.user.avatar}</span>
            ${r.user.name}
          </div>
        </td>
        <td>${typeBadge(r.type)}</td>
        <td>${r.model}</td>
        <td class="u-truncate" style="max-width: 280px;">${r.promptShort}</td>
        <td>${tokensCell(r)}</td>
        <td>${r.cost === 0 && r.status === 'err' ? '0' : '-' + r.cost}</td>
        <td>${(r.durationMs / 1000).toFixed(1)}s</td>
        <td>${statusBadge(r.status)}</td>
        <td class="u-caption">${shortTime(r.time)}</td>
      </tr>
    `).join('');
    if (window.renderIcons) renderIcons();

    // ---------- 抽屉打开 ----------
    tbody.addEventListener('click', (e) => {
      const tr = e.target.closest('tr[data-idx]');
      if (!tr) return;
      const r = ROWS[+tr.dataset.idx];
      openDetail(r);
    });

    function openDetail(r) {
      document.getElementById('drawerTitle').textContent = r.typeLabel + ' 详情';
      document.getElementById('drawerSub').innerHTML = '<code>' + r.id + '</code> · ' + r.time;

      let body = '';

      // 基础信息
      body += `
        <div class="c-drawer-section">
          <div class="c-drawer-section__title">概览</div>
          <div class="c-drawer-section__body">
            <div class="c-drawer-meta-grid">
              <div><span class="k">用户</span><span class="v">${r.user.name} · ${r.user.id}</span></div>
              <div><span class="k">类型</span><span class="v">${r.typeLabel}</span></div>
              <div><span class="k">模型</span><span class="v">${r.model}</span></div>
              <div><span class="k">状态</span><span class="v">${statusBadge(r.status)}</span></div>
              <div><span class="k">耗时</span><span class="v">${(r.durationMs / 1000).toFixed(1)}s (${r.durationMs}ms)</span></div>
              <div><span class="k">消耗积分</span><span class="v">${r.cost === 0 && r.status === 'err' ? '0(已退款)' : '-' + r.cost}</span></div>
              ${r.type === 'chat' ? `
                <div><span class="k">输入 Tokens</span><span class="v">${(r.tokensIn || 0).toLocaleString()}</span></div>
                <div><span class="k">输出 Tokens</span><span class="v">${(r.tokensOut || 0).toLocaleString()}</span></div>
              ` : `
                <div><span class="k">生成数量</span><span class="v">${r.images} 张</span></div>
                <div><span class="k">尺寸</span><span class="v">1024 × 1024</span></div>
              `}
            </div>
          </div>
        </div>`;

      // 用户提示词
      body += `
        <div class="c-drawer-section">
          <div class="c-drawer-section__title">用户输入 (Prompt)</div>
          <div class="c-drawer-section__body c-drawer-section__body--mono">${escapeHtml(r.prompt)}</div>
        </div>`;

      // AI 回复 / 生图结果
      if (r.type === 'chat') {
        body += `
          <div class="c-drawer-section">
            <div class="c-drawer-section__title">AI 回复 (Output)</div>
            <div class="c-drawer-section__body c-drawer-section__body--mono">${r.response ? escapeHtml(r.response) : '<span style="color:var(--text-tertiary);">无回复内容(请求失败)</span>'}</div>
          </div>`;
      } else {
        // 生图缩略图占位
        let imgs = '';
        for (let i = 0; i < (r.images || 0); i++) {
          imgs += `<div style="aspect-ratio:1/1; background:linear-gradient(135deg, #2d2d2d, #404040); border-radius: var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--text-tertiary); font-size:var(--fs-caption);">${r.status === 'err' ? '生成失败' : '示例图 ' + (i + 1)}</div>`;
        }
        body += `
          <div class="c-drawer-section">
            <div class="c-drawer-section__title">生成结果</div>
            <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap: 8px;">${imgs}</div>
          </div>`;
      }

      // 失败信息
      if (r.status === 'err' && r.error) {
        body += `
          <div class="c-drawer-section">
            <div class="c-drawer-section__title" style="color: var(--danger);">失败原因</div>
            <div class="c-drawer-section__body c-drawer-section__body--err"><strong>${r.error.code}</strong>
${r.error.message}

--- raw response ---
${escapeHtml(r.error.raw)}</div>
          </div>`;
      }

      // 上游链路
      body += `
        <div class="c-drawer-section">
          <div class="c-drawer-section__title">上游链路 (Trace)</div>
          <div class="c-drawer-section__body c-drawer-section__body--mono">[client] ${r.id}
  ↓
[router] route=${r.type} model=${r.model}
  ↓
[upstream:${r.upstream.provider}] ${r.upstream.endpoint}
  └ model=${r.upstream.model}
  └ status=${r.upstream.code} ${r.upstream.code >= 400 ? '(error)' : '(ok)'}
  └ duration=${r.durationMs}ms</div>
        </div>`;

      document.getElementById('drawerBody').innerHTML = body;
      if (window.renderIcons) renderIcons();
      openDrawer('detailDrawer');
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
