  <style>
    .doc-page { max-width: 920px; margin: 0 auto; padding: 24px 16px 80px; }
    .doc-topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; }
    .doc-title { font-size: var(--fs-h2); font-weight: var(--fw-semibold); }
    .doc-subtitle { color: var(--text-tertiary); margin-top: 4px; font-size: var(--fs-body-sm); }
    .doc-card { background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-lg); padding: 24px; overflow: auto; }
    .doc-content { color: var(--text-primary); line-height: var(--lh-relaxed); }
    .doc-content h1 { font-size: var(--fs-h1); margin: 0 0 20px; }
    .doc-content h2 { font-size: var(--fs-h3); margin: 28px 0 12px; padding-top: 8px; border-top: 1px solid var(--border-subtle); }
    .doc-content h3 { font-size: var(--fs-h4); margin: 22px 0 10px; }
    .doc-content p { margin: 10px 0; }
    .doc-content blockquote { margin: 16px 0; padding: 12px 16px; border-left: 3px solid var(--brand); background: var(--bg-elevated-2); border-radius: var(--radius-sm); color: var(--text-secondary); }
    .doc-content ul, .doc-content ol { padding-left: 24px; margin: 10px 0; }
    .doc-content code { font-family: var(--font-mono); font-size: 0.92em; background: var(--bg-elevated-2); padding: 2px 5px; border-radius: var(--radius-xs); }
    .doc-content pre { background: #111; color: #eee; padding: 16px; border-radius: var(--radius-md); overflow: auto; line-height: 1.6; }
    .doc-content pre code { background: transparent; padding: 0; }
    .doc-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: var(--fs-body-sm); }
    .doc-content th, .doc-content td { border: 1px solid var(--border-default); padding: 8px 10px; text-align: left; }
    .doc-content th { background: var(--bg-elevated-2); }
    .raw-content { white-space: pre; font-family: var(--font-mono); font-size: var(--fs-body-sm); line-height: 1.6; }
    .doc-frame { width: 100%; min-height: 70vh; border: 0; color-scheme: dark light; background: transparent; }
    .doc-open-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 16px; color: var(--text-link); font-size: var(--fs-body-sm); }
  </style>
</head>

    const key = new URLSearchParams(location.search).get('doc') || 'design';
    const current = DOCS[key] || DOCS.design;
    document.getElementById('docTitle').textContent = current.title;
    document.getElementById('docSubtitle').textContent = current.subtitle;

    mountDoc(current);

    function mountDoc(doc) {
      const content = decodeBase64Utf8(doc.contentB64);
      document.getElementById('docContent').innerHTML = doc.type === 'markdown'
        ? renderMarkdown(content)
        : '<pre class="raw-content"><code>' + escapeHtml(content) + '</code></pre>';
      if (window.renderIcons) renderIcons();
    }

    function decodeBase64Utf8(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return new TextDecoder('utf-8').decode(bytes);
    }

    function renderMarkdown(src) {
      const lines = src.replace(/\r\n/g, '\n').split('\n');
      let html = '';
      let inCode = false;
      let code = [];
      let table = [];

      function flushCode() {
        if (!code.length) return;
        html += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>';
        code = [];
      }
      function flushTable() {
        if (!table.length) return;
        const rows = table.map((line) => line.trim().replace(/^\||\|$/g, '').split('|').map((c) => c.trim()));
        const filtered = rows.filter((r) => !r.every((c) => /^:?-{3,}:?$/.test(c)));
        html += '<table>' + filtered.map((r, i) => '<tr>' + r.map((c) => (i === 0 ? '<th>' : '<td>') + inline(c) + (i === 0 ? '</th>' : '</td>')).join('') + '</tr>').join('') + '</table>';
        table = [];
      }

      for (const line of lines) {
        if (line.startsWith('```')) {
          if (inCode) { flushCode(); inCode = false; }
          else { flushTable(); inCode = true; }
          continue;
        }
        if (inCode) { code.push(line); continue; }
        if (/^\s*\|.+\|\s*$/.test(line)) { table.push(line); continue; }
        flushTable();

        if (!line.trim() || line.trim() === '>') continue;
        if (/^---+$/.test(line.trim())) { html += '<hr />'; continue; }
        if (/^<img\s/i.test(line.trim())) continue;
        if (line.startsWith('# ')) html += '<h1>' + inline(line.slice(2)) + '</h1>';
        else if (line.startsWith('## ')) html += '<h2>' + inline(line.slice(3)) + '</h2>';
        else if (line.startsWith('### ')) html += '<h3>' + inline(line.slice(4)) + '</h3>';
        else if (line.startsWith('> ')) html += '<blockquote>' + inline(line.slice(2)) + '</blockquote>';
        else if (/^\d+\.\s+/.test(line)) html += '<p>' + inline(line) + '</p>';
        else if (/^-\s+/.test(line)) html += '<p>• ' + inline(line.replace(/^-\s+/, '')) + '</p>';
        else html += '<p>' + inline(line) + '</p>';
      }
      flushCode();
      flushTable();
      return html;
    }

    function inline(s) {
      return escapeHtml(s)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
