services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: chatwebui-api
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: postgres://${POSTGRES_USER:-chatwebui}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-chatwebui}?sslmode=disable
      REDIS_ADDR: redis:6379
      APP_SECRET: ${APP_SECRET:?set APP_SECRET in .env}
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
      UPLOAD_DIR: /app/uploads
      ANONYMOUS_CHAT_LIMIT: ${ANONYMOUS_CHAT_LIMIT:-3}
      SEED_DEMO_USER: ${SEED_DEMO_USER:-false}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: chatwebui-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  postgres:
    image: postgres:18-alpine
    container_name: chatwebui-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatwebui}
      POSTGRES_USER: ${POSTGRES_USER:-chatwebui}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-chatwebui} -d $${POSTGRES_DB:-chatwebui}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatwebui-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api-uploads:
  postgres-data:
  redis-data:
