<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#212121" />
  <title>新聊天 · 智聊</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/client.css" />
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="app-sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <span class="logo">智</span>
          <span class="name">智聊</span>
        </div>
        <button class="c-icon-btn" data-toggle="sidebar" aria-label="收起侧栏">
          <span data-icon="sidebar"></span>
        </button>
      </div>

      <div class="sidebar-content">
        <nav class="sidebar-nav">
          <a class="sidebar-item is-active" href="chat.html">
            <span data-icon="edit"></span>新聊天
          </a>
          <a class="sidebar-item" href="#" data-open-modal="searchModal">
            <span data-icon="search"></span>搜索聊天
          </a>
          <a class="sidebar-item" href="image.html">
            <span data-icon="image"></span>生成图片
          </a>
        </nav>

        <div class="sidebar-section">最近</div>
        <div class="sidebar-history">
          <a class="sidebar-history-item" href="conversation.html">AI 系统升级建议</a>
          <a class="sidebar-history-item" href="conversation.html">如何提升团队沟通效率</a>
          <a class="sidebar-history-item" href="conversation.html">写一段关于秋天的散文</a>
          <a class="sidebar-history-item" href="conversation.html">React Hooks 用法整理</a>
          <a class="sidebar-history-item" href="conversation.html">周末旅行路线规划</a>
          <a class="sidebar-history-item" href="conversation.html">Python 数据清洗代码</a>
          <a class="sidebar-history-item" href="conversation.html">商业计划书大纲</a>
        </div>
      </div>

      <div class="sidebar-footer">
        <a href="profile.html" class="sidebar-user">
          <span class="c-avatar">FG</span>
          <div class="u-flex-1">
            <div class="sidebar-user__name">Fiona Giallo</div>
            <div class="sidebar-user__plan">Plus · 8,200 积分</div>
          </div>
        </a>
      </div>
    </aside>
    <div class="sidebar-mask" data-toggle="sidebar" data-target="#sidebar"></div>

    <!-- 主区域 -->
    <main class="app-main">
      <!-- 顶栏 (移动) -->
      <header class="app-topbar">
        <button class="c-icon-btn" data-toggle="sidebar" aria-label="菜单">
          <span data-icon="menu"></span>
        </button>
        <div class="app-topbar__spacer"></div>
        <div class="app-topbar__actions">
          <a class="c-icon-btn" href="chat.html" aria-label="新建会话">
            <span data-icon="edit-2"></span>
          </a>
        </div>
      </header>

      <!-- 空状态欢迎区 -->
      <div class="chat-welcome">
        <h1 class="chat-welcome__title">今天有什么计划?</h1>
      </div>

      <!-- 输入区域 -->
      <div class="composer">
        <div class="composer__inner">
          <form class="composer__bar" onsubmit="event.preventDefault(); sendMessage();">
            <div class="composer__row">
              <textarea
                id="chatInput"
                class="composer__textarea"
                placeholder="有问题,尽管问"
                rows="1"
                data-autogrow
              ></textarea>
            </div>
            <div class="composer__tools">
              <div class="composer__left">
                <button class="c-icon-btn" type="button" aria-label="附件">
                  <span data-icon="plus"></span>
                </button>
              </div>
              <div class="composer__right">
                <button class="mode-pill" type="button" data-popover="modelPicker">
                  <span data-popover-label>智聊 4</span>
                  <span data-icon="chevron-down" data-size="14"></span>
                </button>
                <button class="c-icon-btn" type="button" aria-label="语音输入">
                  <span data-icon="mic"></span>
                </button>
                <button class="send-btn" type="submit" aria-label="发送">
                  <span data-icon="arrow-up"></span>
                </button>
              </div>
            </div>
          </form>

          <div class="composer__hint u-md-only">
            AI 可能会犯错,请核实重要信息。
          </div>
        </div>
      </div>

      <!-- 模型选择浮层 -->
      <div class="c-popover" id="modelPicker">
        <div class="c-popover__item is-active">
          <div class="c-popover__item__main">
            <div class="c-popover__item__title">智聊 4</div>
            <div class="c-popover__item__desc">主力模型 · 复杂推理与代码</div>
          </div>
          <span class="c-popover__item__check" data-icon="check"></span>
        </div>
        <div class="c-popover__item">
          <div class="c-popover__item__main">
            <div class="c-popover__item__title">智聊 3.5</div>
            <div class="c-popover__item__desc">轻量快速 · 日常问答</div>
          </div>
          <span class="c-popover__item__check" data-icon="check"></span>
        </div>
        <div class="c-popover__item">
          <div class="c-popover__item__main">
            <div class="c-popover__item__title">深思 Pro</div>
            <div class="c-popover__item__desc">长文与伦理推理 · 200K 上下文</div>
          </div>
          <span class="c-popover__item__check" data-icon="check"></span>
        </div>
        <div class="c-popover__item">
          <div class="c-popover__item__main">
            <div class="c-popover__item__title">青狼 Qwen2-72B</div>
            <div class="c-popover__item__desc">本地中文增强 · 数据不出境</div>
          </div>
          <span class="c-popover__item__check" data-icon="check"></span>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/js/common.js"></script>
  <script>
    mountSearchModal();

    function sendMessage() {
      const input = document.getElementById('chatInput');
      const val = input.value.trim();
      if (!val) return;
      window.location.href = 'conversation.html?q=' + encodeURIComponent(val);
    }
  </script>
</body>
</html>
