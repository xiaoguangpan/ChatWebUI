<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#212121" />
  <title>注册 · 智聊</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/client.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">智</div>
      <h1 class="auth-card__title">创建账户</h1>
      <p class="auth-card__subtitle">免费注册,获赠 200 积分</p>

      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='chat.html';">
        <div class="c-field">
          <label class="c-label">昵称</label>
          <input class="c-input c-input--lg" type="text" placeholder="如何称呼你?" required />
        </div>
        <div class="c-field">
          <label class="c-label">手机号</label>
          <input class="c-input c-input--lg" type="tel" placeholder="11 位手机号" required />
        </div>
        <div class="c-field">
          <label class="c-label">短信验证码</label>
          <div style="display:flex; gap:8px;">
            <input class="c-input c-input--lg" type="text" placeholder="6 位验证码" required style="flex:1;" />
            <button class="c-btn c-btn--secondary c-btn--lg" type="button" style="flex-shrink:0;">获取验证码</button>
          </div>
        </div>
        <div class="c-field">
          <label class="c-label">密码</label>
          <input class="c-input c-input--lg" type="password" placeholder="8 位以上,含字母与数字" required />
          <span class="c-help">至少 8 位,建议包含大小写字母与数字</span>
        </div>

        <label style="display:flex; align-items: flex-start; gap: 8px; font-size: var(--fs-body-sm); color: var(--text-secondary); margin-top: 4px;">
          <input type="checkbox" required style="margin-top: 3px;" />
          <span>我已阅读并同意 <a href="#">服务条款</a> 与 <a href="#">隐私政策</a></span>
        </label>

        <button class="c-btn c-btn--primary c-btn--lg c-btn--block" type="submit">
          注册并登录
        </button>

        <p class="auth-form__footer">
          已有账户?<a href="login.html">直接登录</a>
        </p>
      </form>
    </div>
  </div>
  <script src="../assets/js/common.js"></script>
</body>
</html>
