<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#212121" />
  <title>登录 · 智聊</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/client.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-card__logo">智</div>
      <h1 class="auth-card__title">欢迎回来</h1>
      <p class="auth-card__subtitle">登录你的智聊账户</p>

      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='chat.html';">
        <div class="c-field">
          <label class="c-label">手机号 / 邮箱</label>
          <input class="c-input c-input--lg" type="text" placeholder="请输入手机号或邮箱" required />
        </div>
        <div class="c-field">
          <label class="c-label u-flex u-justify-between">
            <span>密码</span>
            <a href="#" style="color: var(--text-tertiary); font-size: var(--fs-caption); font-weight: 400;">忘记密码?</a>
          </label>
          <input class="c-input c-input--lg" type="password" placeholder="请输入密码" required />
        </div>

        <button class="c-btn c-btn--primary c-btn--lg c-btn--block" type="submit" style="margin-top: 8px;">
          登录
        </button>

        <div class="auth-form__divider">或</div>

        <button class="c-btn c-btn--secondary c-btn--lg c-btn--block" type="button">
          <span data-icon="message"></span>验证码登录
        </button>
        <button class="c-btn c-btn--secondary c-btn--lg c-btn--block" type="button">
          <span data-icon="user"></span>使用微信登录
        </button>

        <p class="auth-form__footer">
          还没有账户?<a href="register.html">立即注册</a>
        </p>
      </form>
    </div>
  </div>
  <script src="../assets/js/common.js"></script>
</body>
</html>
